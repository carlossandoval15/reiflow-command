// ─── CSV PARSER ──────────────────────────────────────────────────────────────

const parseCSV = (text) => {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return { headers: [], rows: [] };
  const parseRow = (line) => {
    const result = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    result.push(cur.trim());
    return result;
  };
  const headers = parseRow(lines[0]).map(h => h.replace(/^"|"$/g,'').trim());
  const rows = lines.slice(1).filter(l => l.trim()).map(l => {
    const vals = parseRow(l).map(v => v.replace(/^"|"$/g,'').trim());
    const obj = {};
    headers.forEach((h, i) => { obj[h] = vals[i] || ''; });
    return obj;
  });
  return { headers, rows };
};

// Smart column detector — maps CSV columns to ReiFlow fields
const detectColumns = (headers) => {
  const h = headers.map(x => x.toLowerCase().replace(/[^a-z0-9]/g,''));
  const find = (...keys) => {
    for (const k of keys) {
      const idx = h.findIndex(x => x.includes(k) || k.includes(x));
      if (idx !== -1) return headers[idx];
    }
    return '';
  };
  return {
    firstName:  find('firstname','first'),
    lastName:   find('lastname','last'),
    fullName:   find('fullname','ownername','name','owner','contact'),
    phone:      find('phone1','phone','primary','mobile','cell','tel'),
    phone2:     find('phone2','secondphone','altphone','alternate'),
    phone3:     find('phone3'),
    address:    find('propertyaddress','propaddr','streetaddress','address','addr','street','property'),
    city:       find('propcity','propertycity','city'),
    state:      find('propstate','propertystate','state','st'),
    zip:        find('propzip','propertyzip','zipcode','zip','postal'),
    propType:   find('propertytype','proptype','type'),
    listPrice:  find('listprice','askingprice','price'),
    source:     find('leadsource','source','leadtype','listtype','category'),
    notes:      find('notes','comments','description','remarks'),
    email:      find('email','emailaddress'),
  };
};

        mapping.city    ? row[mapping.city]    || '' : '',

      const listPrice = mapping.listPrice ? Number((row[mapping.listPrice]||'0').replace(/[^0-9.]/g,'')) : 0;
      const notes     = mapping.notes     ? row[mapping.notes]     || ''       : '';
      const email     = mapping.email     ? row[mapping.email]     || ''       : '';

            const name=mapping.fullName?row[mapping.fullName]||'':([fn,ln].filter(Boolean).join(' '));

            const addr=[mapping.address?row[mapping.address]||'':'',mapping.city?row[mapping.city]||'':''].filter(Boolean).join(', ');
            return(
              <div key={i} style={{background:'#0d0d0d',borderRadius:8,padding:10,marginBottom:6,border:`1px solid ${C.border}`}}>
                <div style={{fontSize:13,fontWeight:700,color:C.white}}>{name||'—'}</div>
                <div style={{fontSize:12,color:C.green}}>{phone}</div>
                <div style={{fontSize:11,color:C.inkM}}>{addr||'—'}</div>
              </div>
            );
          })}

          <div style={{display:'flex',gap:8,marginTop:14}}>
            <button onClick={()=>setStep(1)} style={{flex:1,padding:'12px',borderRadius:12,border:`1px solid ${C.border}`,background:'#222',color:C.inkM,fontSize:13,fontWeight:600,cursor:'pointer'}}>← Back</button>
            <button onClick={handleImport} style={{flex:2,padding:'12px',borderRadius:12,border:'none',background:C.gold,color:'#000',fontSize:14,fontWeight:800,cursor:'pointer'}}>
              Import {parsed.rows.length} Leads →
            </button>
          </div>
        </>}

        {/* STEP 3 — Done */}
        {step===3&&<>
          <div style={{textAlign:'center',padding:'30px 0'}}>
            <div style={{fontSize:56,marginBottom:16}}>🎉</div>
            <div style={{fontSize:24,fontWeight:900,color:C.gold,marginBottom:8}}>{result} Leads Imported</div>
            <div style={{fontSize:14,color:C.inkM,marginBottom:6}}>Added to your {importAs} pipeline</div>
            {importAs==='seller'&&<div style={{fontSize:13,color:C.orange,marginTop:12,background:C.orangeBg,borderRadius:10,padding:12}}>
              💡 Leads with phones are ready to call. Leads without phones need skip tracing.
            </div>}
            <button onClick={onClose} style={{marginTop:24,width:'100%',padding:'14px',borderRadius:12,border:'none',background:C.gold,color:'#000',fontSize:15,fontWeight:800,cursor:'pointer'}}>
              Go to Leads →
            </button>
          </div>
        </>}
      </div>
    </div>
  );
};

// ─── UTILS ───────────────────────────────────────────────────────────────────

const fmt$=v=>!v||isNaN(v)?'$0':v>=1000000?'$'+(v/1000000).toFixed(2)+'M':v>=1000?'$'+(v/1000).toFixed(0)+'K':'$'+Math.round(v).toLocaleString();
const fmtFull$=v=>'$'+Math.round(v||0).toLocaleString();
const dialNum=p=>(p||'').replace(/\D/g,'');

const statusColor=s=>{
  if(['Ready to Call','Not Contacted'].includes(s))return{c:C.green,bg:C.greenBg};
  if(['Called','Left VM'].includes(s))return{c:C.blue,bg:C.blueBg};
  if(['Follow Up','Callback'].includes(s))return{c:C.orange,bg:C.orangeBg};
  if(['Signed Up','Active Client','Under Contract'].includes(s))return{c:C.gold,bg:'#2a1500'};
  if(['Not Interested','Dead','Churned'].includes(s))return{c:C.inkL,bg:'#111'};
  if(s==='Need Skip Trace')return{c:C.orange,bg:C.orangeBg};
  if(s==='Pitched')return{c:C.purple,bg:C.purpleBg};
  if(s==='Interested')return{c:C.teal,bg:C.tealBg};
  return{c:C.inkM,bg:C.card};
};

const Badge=({text,color,bg})=><span style={{fontSize:11,fontWeight:700,padding:'3px 8px',borderRadius:10,background:bg,color,whiteSpace:'nowrap'}}>{text}</span>;

const SourceBadge=({source})=>{
  const s=(source||'').toLowerCase();
  if(s.includes('ispeed')||s.includes('speed'))return<Badge text="iSpeedToLead" color={C.teal} bg={C.tealBg}/>;
  if(s.includes('expired'))return<Badge text="Expired" color={C.purple} bg={C.purpleBg}/>;
  if(s.includes('foreclos')||s.includes('nod')||s.includes('lis'))return<Badge text="Foreclosure" color={C.red} bg={C.redBg}/>;
  if(s.includes('fsbo'))return<Badge text="FSBO" color={C.blue} bg={C.blueBg}/>;
  if(s.includes('probate'))return<Badge text="Probate" color={C.gold} bg={'#2a1500'}/>;
  if(source)return<Badge text={source} color={C.inkM} bg={'#222'}/>;
  return null;
};

// ─── CALL MODE ───────────────────────────────────────────────────────────────

const CallMode=({lead,allCallable,leadIndex,onClose,onUpdate,onNext,onPrev})=>{
  const [showScript,setShowScript]=useState(false);
  const [note,setNote]=useState(lead.notes||'');

  const scriptKey = lead.type==='agency'?'agency':lead.type==='foreclosure'?'foreclosure':lead.type==='surplus'?'surplus':
    (lead.source||'').toLowerCase().includes('expired')?'expired':'seller';

  const filledScript=(SCRIPTS[scriptKey]||SCRIPTS.seller)
    .replace(/\[OWNER\]/g,lead.owner||lead.contact||lead.name||'[Name]')
    .replace(/\[ADDRESS\]/g,lead.fullAddress||lead.address||'[Address]')
    .replace(/\[EXCESS\]/g,lead.excess?fmtFull$(lead.excess):'[Amount]')
    .replace(/\[CONTACT\]/g,lead.contact||lead.owner||'[Name]')
    .replace(/\[AREA\]/g,lead.city||lead.county||'your area');

  const outcomes=lead.type==='agency'
    ?['No Answer','Left VM','Callback','Pitched','Signed!','Not Interested']
    :['No Answer','Left VM','Callback','Follow Up','🎉 Signed Up!','Not Interested'];

  const pick=o=>{
    const mapped={'Signed!':'Active Client','🎉 Signed Up!':'Signed Up'}[o]||o;
    const updated={...lead,status:mapped,notes:note};
    onUpdate(updated);
    if(['No Answer','Left VM'].includes(o))onNext();
  };

  const outcomeStyle=o=>{
    if(o.includes('Signed'))return{bg:C.gold,color:'#000',fw:800};
    if(o==='No Answer')return{bg:'#1a1a1a',color:C.inkM,fw:600};
    if(o==='Left VM')return{bg:C.blueBg,color:C.blue,fw:600};
    if(o==='Callback'||o==='Follow Up')return{bg:C.orangeBg,color:C.orange,fw:600};
    if(o==='Pitched')return{bg:C.purpleBg,color:C.purple,fw:600};
    if(o==='Not Interested')return{bg:'#1a1a1a',color:C.red,fw:500};
    return{bg:'#1a1a1a',color:C.inkM,fw:500};
  };

  const hasPhone2=lead.phone2&&lead.phone2!==lead.phone;
  const hasPhone3=lead.phone3&&lead.phone3!==lead.phone&&lead.phone3!==lead.phone2;

  return(
    <div style={{position:'fixed',inset:0,background:C.bg,zIndex:999,display:'flex',flexDirection:'column',animation:'slideUp 0.25s ease',maxWidth:480,margin:'0 auto'}}>
      {/* Header */}
      <div style={{padding:'16px 20px 12px',display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
        <button onClick={onClose} style={{background:'none',border:'none',color:C.inkM,fontSize:14,cursor:'pointer',fontWeight:600}}>← Back</button>
        <div style={{fontSize:11,fontWeight:700,color:C.gold}}>{lead.id}{allCallable.length>1?` · ${leadIndex+1}/${allCallable.length}`:''}</div>
        <div style={{display:'flex',gap:6}}>
          {leadIndex>0&&<button onClick={onPrev} style={{background:C.card2,border:`1px solid ${C.border}`,color:C.inkM,fontSize:12,padding:'4px 10px',borderRadius:8,cursor:'pointer'}}>←</button>}
          {leadIndex<allCallable.length-1&&<button onClick={onNext} style={{background:C.card2,border:`1px solid ${C.border}`,color:C.inkM,fontSize:12,padding:'4px 10px',borderRadius:8,cursor:'pointer'}}>→</button>}
        </div>
      </div>

      <div style={{flex:1,overflowY:'auto',padding:'24px 20px'}}>
        <div style={{fontSize:10,fontWeight:700,color:C.inkM,letterSpacing:2,marginBottom:6,textTransform:'uppercase'}}>Calling</div>
        <div style={{fontSize:34,fontWeight:900,color:C.white,lineHeight:1.1,marginBottom:4}}>{lead.owner||lead.contact||lead.name||'Unknown'}</div>
        {lead.phone&&<div style={{fontSize:16,color:C.inkM,marginBottom:4,fontWeight:500}}>{lead.phone}</div>}
        {lead.source&&<div style={{marginBottom:16}}><SourceBadge source={lead.source}/></div>}

        {/* Call button(s) */}
        {lead.phone?(
          <div style={{marginBottom:24}}>
            <a href={`tel:${dialNum(lead.phone)}`} style={{display:'flex',alignItems:'center',justifyContent:'center',gap:12,width:'100%',padding:'18px 0',borderRadius:18,background:'linear-gradient(135deg,#16a34a,#22c55e)',textDecoration:'none',boxShadow:'0 0 40px rgba(34,197,94,0.25)',animation:'ring 2.5s ease infinite'}}>
              <span style={{fontSize:26}}>📞</span><span style={{fontSize:20,fontWeight:900,color:'#000'}}>Call Now</span>
            </a>
            {(hasPhone2||hasPhone3)&&(
              <div style={{display:'flex',gap:8,marginTop:8}}>
                {hasPhone2&&<a href={`tel:${dialNum(lead.phone2)}`} style={{flex:1,padding:'10px',borderRadius:12,background:C.blueBg,border:`1px solid ${C.blue}33`,textDecoration:'none',textAlign:'center',fontSize:12,color:C.blue,fontWeight:700}}>📞 Alt 1: {lead.phone2}</a>}
                {hasPhone3&&<a href={`tel:${dialNum(lead.phone3)}`} style={{flex:1,padding:'10px',borderRadius:12,background:C.blueBg,border:`1px solid ${C.blue}33`,textDecoration:'none',textAlign:'center',fontSize:12,color:C.blue,fontWeight:700}}>📞 Alt 2: {lead.phone3}</a>}
              </div>
            )}
          </div>
        ):(
          <div style={{textAlign:'center',padding:'18px',background:C.orangeBg,borderRadius:16,border:`1px solid ${C.orange}44`,marginBottom:24}}>
            <div style={{fontSize:16,fontWeight:700,color:C.orange}}>⚠️ No Phone Number</div>
            <div style={{fontSize:12,color:C.inkM,marginTop:4}}>Skip trace this lead first</div>
          </div>
        )}

        {/* Property card */}
        <div style={{background:C.card2,borderRadius:16,padding:18,border:`1px solid ${C.border}`,marginBottom:14}}>
          <div style={{fontSize:10,fontWeight:700,color:C.inkM,marginBottom:10,letterSpacing:1,textTransform:'uppercase'}}>Property Details</div>
          <div style={{fontSize:13,fontWeight:600,color:C.white,marginBottom:12,lineHeight:1.4}}>📍 {lead.fullAddress||lead.address||'No address'}</div>
          {lead.type==='surplus'&&lead.excess>0&&(
            <div style={{display:'flex',gap:10}}>
              <div style={{flex:1,background:'#0a2010',borderRadius:10,padding:12,border:`1px solid ${C.green}22`}}>
                <div style={{fontSize:9,color:C.inkM,marginBottom:2,fontWeight:700,letterSpacing:1}}>COUNTY HOLDS</div>
                <div style={{fontSize:20,fontWeight:900,color:C.green}}>{fmtFull$(lead.excess)}</div>
              </div>
              <div style={{flex:1,background:'#2a1500',borderRadius:10,padding:12,border:`1px solid ${C.gold}22`}}>
                <div style={{fontSize:9,color:C.inkM,marginBottom:2,fontWeight:700,letterSpacing:1}}>YOUR 35% CUT</div>
                <div style={{fontSize:20,fontWeight:900,color:C.gold}}>{fmtFull$(lead.cut)}</div>
              </div>
            </div>
          )}
          {lead.type==='foreclosure'&&lead.equity>0&&(
            <div style={{display:'flex',gap:10}}>
              <div style={{flex:1,background:C.blueBg,borderRadius:10,padding:12}}>
                <div style={{fontSize:9,color:C.inkM,marginBottom:2,fontWeight:700,letterSpacing:1}}>EST EQUITY</div>
                <div style={{fontSize:20,fontWeight:900,color:C.blue}}>{fmtFull$(lead.equity)}</div>
              </div>
              <div style={{flex:1,background:'#111',borderRadius:10,padding:12,border:`1px solid ${C.border}`}}>
                <div style={{fontSize:9,color:C.inkM,marginBottom:2,fontWeight:700,letterSpacing:1}}>LOAN BAL</div>
                <div style={{fontSize:20,fontWeight:900,color:C.inkM}}>{fmtFull$(lead.loanBal)}</div>
              </div>
            </div>
          )}
          {lead.type==='seller'&&lead.listPrice>0&&(
            <div style={{background:'#1a1a2a',borderRadius:10,padding:12,border:`1px solid ${C.blue}22`}}>
              <div style={{fontSize:9,color:C.inkM,marginBottom:2,fontWeight:700,letterSpacing:1}}>LIST/ASK PRICE</div>
              <div style={{fontSize:20,fontWeight:900,color:C.blue}}>{fmtFull$(lead.listPrice||lead.askingPrice)}</div>
            </div>
          )}
        </div>

        {/* Script */}
        <div style={{background:C.card2,borderRadius:16,border:`1px solid ${C.border}`,marginBottom:14,overflow:'hidden'}}>
          <button onClick={()=>setShowScript(!showScript)} style={{width:'100%',padding:'14px 18px',background:'none',border:'none',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:13,fontWeight:700,color:C.white}}>📝 Call Script</span>
            <span style={{fontSize:12,color:C.inkM}}>{showScript?'Hide ↑':'Show ↓'}</span>
          </button>
          {showScript&&<div style={{padding:'0 18px 18px'}}>
            <div style={{fontSize:12,lineHeight:1.8,color:C.inkM,whiteSpace:'pre-wrap',background:'#0d0d0d',borderRadius:10,padding:14,fontStyle:'italic',borderLeft:`3px solid ${C.gold}`}}>
              {filledScript}
            </div>
          </div>}
        </div>

        {/* Notes */}
        <div style={{background:C.card2,borderRadius:16,border:`1px solid ${C.border}`,padding:16,marginBottom:14}}>
          <div style={{fontSize:10,fontWeight:700,color:C.inkM,marginBottom:8,textTransform:'uppercase',letterSpacing:1}}>Call Notes</div>
          <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="What happened on the call..." rows={3}
            style={{width:'100%',background:'#0d0d0d',border:`1px solid ${C.border}`,borderRadius:10,padding:12,color:C.white,fontSize:13,resize:'none',outline:'none',lineHeight:1.5}}/>
        </div>
      </div>

      {/* Outcome buttons */}
      <div style={{padding:'12px 20px 34px',borderTop:`1px solid ${C.border}`,background:C.bg,flexShrink:0}}>
        <div style={{fontSize:10,fontWeight:700,color:C.inkM,marginBottom:10,textTransform:'uppercase',letterSpacing:1,textAlign:'center'}}>Log Outcome</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
          {outcomes.map(o=>{const st=outcomeStyle(o);return(
            <button key={o} onClick={()=>pick(o)} style={{padding:'10px 4px',borderRadius:12,background:st.bg,color:st.color,fontSize:11,fontWeight:st.fw,border:'none',cursor:'pointer',lineHeight:1.3}}>
              {o}
            </button>
          );})}
        </div>
      </div>
    </div>
  );
};

// ─── LEADS TAB ────────────────────────────────────────────────────────────────

const SUB_TABS=[
  {id:'seller',label:'🏠 Seller',color:C.teal},
  {id:'surplus',label:'💰 Surplus',color:C.green},
  {id:'foreclosure',label:'⚠️ Foreclosure',color:C.orange},
];

const LeadsTab=({surplus,setSurplus,foreclosure,setForeclosure,seller,setSeller,onCallMode})=>{
  const [subTab,setSubTab]=useState('seller');
  const [search,setSearch]=useState('');
  const [filter,setFilter]=useState('all');
  const [expanded,setExpanded]=useState(null);
  const [showImport,setShowImport]=useState(false);
  const [sourceFilter,setSourceFilter]=useState('all');

  const leads   = subTab==='surplus'?surplus:subTab==='foreclosure'?foreclosure:seller;
  const setLeads= subTab==='surplus'?setSurplus:subTab==='foreclosure'?setForeclosure:setSeller;

  // Unique sources in current list
  const sources=[...new Set(leads.map(l=>l.source).filter(Boolean))];

  const filtered=leads.filter(l=>{
    if(filter==='phone'&&!l.phone)return false;
    if(filter==='no-phone'&&l.phone)return false;
    if(sourceFilter!=='all'&&l.source!==sourceFilter)return false;
    const q=search.toLowerCase();
    if(q&&!JSON.stringify(l).toLowerCase().includes(q))return false;
    return true;
  });

  const upd=(id,patch)=>setLeads(prev=>prev.map(l=>l.id===id?{...l,...patch}:l));
  const remove=(id)=>setLeads(prev=>prev.filter(l=>l.id!==id));

  const addBlank=()=>{
    const prefix=subTab==='surplus'?'SF':subTab==='foreclosure'?'FC':'SL';
    const id=`${prefix}-${Date.now()}`;
    const blank={id,type:subTab,propType:'SFR',owner:'',phone:'',address:'New Lead',fullAddress:'',source:'',notes:'',status:'Not Contacted',
      ...(subTab==='surplus'?{excess:0,cut:0,county:'',auctionDate:''}:{}),
      ...(subTab==='foreclosure'?{loanBal:0,estValue:0,equity:0,county:''}:{}),
      ...(subTab==='seller'?{listPrice:0,askingPrice:0,email:'',phone2:'',phone3:''}:{}),
    };
    setLeads(prev=>[blank,...prev]);
    setExpanded(id);
  };

  const handleImport=(importedLeads, asType)=>{
    if(asType==='seller')setSeller(prev=>[...importedLeads,...prev]);
    else if(asType==='surplus')setSurplus(prev=>[...importedLeads,...prev]);
    else if(asType==='foreclosure')setForeclosure(prev=>[...importedLeads,...prev]);
    setSubTab(asType==='agency'?'seller':asType);
    setShowImport(false);
  };

  const callable=filtered.filter(l=>l.phone&&!['Not Interested','Dead'].includes(l.status));

  const statusOpts={
    surplus:['Need Skip Trace','Not Contacted','Ready to Call','Called','Left VM','Follow Up','Signed Up','Not Interested','Dead'],
    foreclosure:['Not Contacted','Called','Left VM','Follow Up','Under Contract','Not Interested','Dead'],
    seller:['Not Contacted','Called','Left VM','Follow Up','Interested','Under Contract','Signed Up','Not Interested','Dead'],
  };

  return(
    <div style={{padding:'16px',paddingBottom:90}}>
      {showImport&&<ImportModal onClose={()=>setShowImport(false)} onImport={handleImport} targetType={subTab} setTargetType={setSubTab}/>}

      {/* Sub tabs */}
      <div style={{display:'flex',gap:6,marginBottom:14}}>
        {SUB_TABS.map(t=>(
          <button key={t.id} onClick={()=>{setSubTab(t.id);setExpanded(null);setSearch('');setFilter('all');setSourceFilter('all');}}
            style={{flex:1,padding:'9px 4px',borderRadius:12,border:`2px solid ${subTab===t.id?t.color:C.border}`,background:subTab===t.id?t.color+'22':'#111',color:subTab===t.id?t.color:C.inkM,fontSize:11,fontWeight:700,cursor:'pointer'}}>
            {t.label}<br/><span style={{fontSize:10,opacity:0.7}}>{(subTab===t.id?leads:subTab==='surplus'?surplus:subTab==='foreclosure'?foreclosure:seller).length===0?'0':(subTab===t.id?leads:leads).length||leads.length}</span>
          </button>
        ))}
      </div>

      {/* Actions row */}
      <div style={{display:'flex',gap:8,marginBottom:10}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search..." style={{flex:1,padding:'10px 14px',borderRadius:10,border:`1px solid ${C.border}`,background:C.card2,color:C.white,fontSize:14,outline:'none'}}/>
        <button onClick={()=>setShowImport(true)} style={{padding:'10px 12px',borderRadius:10,border:`1px solid ${C.gold}`,background:'#2a1500',color:C.gold,fontSize:12,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap'}}>📥 Import</button>
        <button onClick={addBlank} style={{padding:'10px 12px',borderRadius:10,border:'none',background:C.gold,color:'#000',fontSize:13,fontWeight:700,cursor:'pointer'}}>+</button>
      </div>

      {/* Filters */}
      <div style={{display:'flex',gap:6,marginBottom:sources.length?8:14,overflowX:'auto',paddingBottom:2}}>
        {[['all',`All (${leads.length})`],['phone','📱 Has Phone'],['no-phone','🔍 Need Trace']].map(([v,l])=>(
          <button key={v} onClick={()=>setFilter(v)} style={{padding:'6px 12px',borderRadius:20,border:'none',background:filter===v?C.gold:'#1a1a1a',color:filter===v?'#000':C.inkM,fontSize:12,fontWeight:600,cursor:'pointer',whiteSpace:'nowrap'}}>{l}</button>
        ))}
      </div>

      {/* Source filter pills (for imported lists) */}
      {sources.length>0&&(
        <div style={{display:'flex',gap:6,marginBottom:14,overflowX:'auto',paddingBottom:2}}>
          <button onClick={()=>setSourceFilter('all')} style={{padding:'5px 10px',borderRadius:20,border:'none',background:sourceFilter==='all'?C.teal:'#1a1a1a',color:sourceFilter==='all'?'#000':C.inkM,fontSize:11,fontWeight:600,cursor:'pointer',whiteSpace:'nowrap',flexShrink:0}}>All Sources</button>
          {sources.map(s=>(
            <button key={s} onClick={()=>setSourceFilter(s)} style={{padding:'5px 10px',borderRadius:20,border:'none',background:sourceFilter===s?C.teal:'#1a1a1a',color:sourceFilter===s?'#000':C.inkM,fontSize:11,fontWeight:600,cursor:'pointer',whiteSpace:'nowrap',flexShrink:0}}>{s}</button>
          ))}
        </div>
      )}

      {/* Call session banner */}
      {callable.length>0&&(
        <button onClick={()=>onCallMode(callable[0],subTab,callable)} style={{width:'100%',background:'linear-gradient(135deg,#16a34a,#15803d)',borderRadius:14,padding:'13px 16px',border:'none',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <div style={{textAlign:'left'}}>
            <div style={{fontSize:13,fontWeight:800,color:'#000'}}>📞 Start Calling Session</div>
            <div style={{fontSize:11,color:'#00441b'}}>{callable.length} lead{callable.length!==1?'s':''} ready to call</div>
          </div>
          <div style={{fontSize:22,fontWeight:900,color:'#000'}}>→</div>
        </button>
      )}

      {/* Empty state */}
      {filtered.length===0&&(
        <div style={{textAlign:'center',padding:'40px 20px',color:C.inkM}}>
          <div style={{fontSize:40,marginBottom:12}}>📭</div>
          <div style={{fontSize:15,fontWeight:700,color:C.white,marginBottom:6}}>No leads yet</div>
          <div style={{fontSize:13,marginBottom:20}}>Import a CSV list or add leads manually</div>
          <button onClick={()=>setShowImport(true)} style={{padding:'12px 24px',borderRadius:12,border:'none',background:C.gold,color:'#000',fontSize:14,fontWeight:800,cursor:'pointer'}}>📥 Import CSV List</button>
        </div>
      )}

      {/* Lead cards */}
      {filtered.map(l=>{
        const s=statusColor(l.status);
        const isOpen=expanded===l.id;
        return(
          <div key={l.id} style={{background:C.card2,borderRadius:14,marginBottom:10,border:`1px solid ${l.phone?C.green+'33':C.border}`,overflow:'hidden'}}>
            <div onClick={()=>setExpanded(isOpen?null:l.id)} style={{padding:14,cursor:'pointer'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:10}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:5,flexWrap:'wrap'}}>
                    <span style={{fontSize:10,fontWeight:800,color:C.gold}}>{l.id.length>12?l.id.split('-').slice(-1)[0]:l.id}</span>
                    <Badge text={l.propType||'SFR'} color={C.blue} bg={C.blueBg}/>
                    <Badge text={l.status} color={s.c} bg={s.bg}/>

                  <select value={l.status} onChange={e=>upd(l.id,{status:e.target.value})} style={{width:'100%',padding:'8px 10px',borderRadius:8,border:`1px solid ${C.border}`,background:'#0d0d0d',color:C.white,fontSize:13,outline:'none'}}>
                    {(statusOpts[subTab]||statusOpts.seller).map(o=><option key={o}>{o}</option>)}
                  </select>
                </div>

                <textarea value={l.notes||''} onChange={e=>upd(l.id,{notes:e.target.value})} placeholder="Notes..." rows={2} style={{width:'100%',padding:'8px 10px',borderRadius:8,border:`1px solid ${C.border}`,background:'#0d0d0d',color:C.white,fontSize:12,resize:'none',outline:'none',marginBottom:10}}/>

                <div style={{display:'flex',gap:8}}>
                  {l.phone&&<button onClick={()=>onCallMode(l,subTab,callable)} style={{flex:1,padding:'10px',borderRadius:10,background:C.green,border:'none',color:'#000',fontSize:13,fontWeight:800,cursor:'pointer'}}>📞 Call Mode</button>}

                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
};

// ─── AGENCY ──────────────────────────────────────────────────────────────────

const AgencyTab=({clients,setClients,onCallMode})=>{
  const [expanded,setExpanded]=useState(null);
  const stages=['Prospect','Pitched','Active Client','Paused','Churned'];
  const mrr=clients.filter(c=>c.status==='Active Client').reduce((a,c)=>a+Number(c.retainer||0),0);
  const pipeline=clients.filter(c=>['Prospect','Pitched'].includes(c.status)).reduce((a,c)=>a+Number(c.retainer||0),0);
  const add=()=>{const id='R-'+String(clients.length+1).padStart(3,'0');const c={id,type:'agency',name:'',contact:'',phone:'',email:'',service:'Social Media Management',retainer:0,status:'Prospect',notes:''};setClients(p=>[c,...p]);setExpanded(id);};
  const upd=(id,patch)=>setClients(p=>p.map(c=>c.id===id?{...c,...patch}:c));

  return(
    <div style={{padding:16,paddingBottom:90}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <h1 style={{fontSize:20,fontWeight:800,color:C.gold}}>🍽️ Agency</h1>
        <button onClick={add} style={{padding:'8px 16px',borderRadius:10,border:'none',background:C.gold,color:'#000',fontSize:13,fontWeight:700,cursor:'pointer'}}>+ Add</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
        <div style={{background:'linear-gradient(135deg,#2a1500,#1a0d00)',borderRadius:14,padding:16,border:`1px solid ${C.gold}44`}}>
          <div style={{fontSize:10,color:C.inkM,fontWeight:700,marginBottom:4,textTransform:'uppercase'}}>Monthly MRR</div>
          <div style={{fontSize:26,fontWeight:900,color:C.gold}}>{fmt$(mrr)||'$0'}</div>
          <div style={{fontSize:11,color:C.inkM,marginTop:2}}>{clients.filter(c=>c.status==='Active Client').length} active</div>
        </div>
        <div style={{background:C.card2,borderRadius:14,padding:16,border:`1px solid ${C.border}`}}>
          <div style={{fontSize:10,color:C.inkM,fontWeight:700,marginBottom:4,textTransform:'uppercase'}}>Pipeline Val</div>
          <div style={{fontSize:26,fontWeight:900,color:C.purple}}>{fmt$(pipeline)||'$0'}</div>
          <div style={{fontSize:11,color:C.inkM,marginTop:2}}>{clients.filter(c=>['Prospect','Pitched'].includes(c.status)).length} prospects</div>
        </div>
      </div>
      <div style={{display:'flex',gap:6,marginBottom:16,overflowX:'auto',paddingBottom:2}}>
        {stages.map(s=>{const sc=statusColor(s);const cnt=clients.filter(c=>c.status===s).length;return(
          <div key={s} style={{flexShrink:0,background:sc.bg,borderRadius:20,padding:'5px 12px',border:`1px solid ${sc.c}33`,display:'flex',alignItems:'center',gap:5}}>
            <span style={{fontSize:11,fontWeight:700,color:sc.c}}>{s}</span>
            {cnt>0&&<span style={{fontSize:10,fontWeight:800,background:sc.c,color:'#000',borderRadius:10,padding:'1px 5px'}}>{cnt}</span>}
          </div>
        );})}
      </div>
      {clients.map(c=>{const s=statusColor(c.status);const isOpen=expanded===c.id;return(
        <div key={c.id} style={{background:C.card2,borderRadius:14,marginBottom:10,border:`1px solid ${c.status==='Active Client'?C.gold+'44':C.border}`,overflow:'hidden'}}>
          <div onClick={()=>setExpanded(isOpen?null:c.id)} style={{padding:14,cursor:'pointer'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:10}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',gap:6,marginBottom:5,flexWrap:'wrap'}}><span style={{fontSize:10,fontWeight:800,color:C.gold}}>{c.id}</span><Badge text={c.status} color={s.c} bg={s.bg}/></div>
                <div style={{fontSize:15,fontWeight:700,color:C.white}}>{c.name||'New Restaurant'}</div>
                {c.contact&&<div style={{fontSize:12,color:C.inkM,marginTop:1}}>{c.contact}</div>}
                {c.phone&&<div style={{fontSize:12,color:C.green,marginTop:2}}>📱 {c.phone}</div>}
              </div>
              {c.retainer>0&&<div style={{textAlign:'right',flexShrink:0}}><div style={{fontSize:16,fontWeight:800,color:C.gold}}>{fmt$(c.retainer)}</div><div style={{fontSize:10,color:C.inkM}}>/month</div></div>}
            </div>
          </div>
          {isOpen&&(
            <div style={{padding:'0 14px 14px',borderTop:`1px solid ${C.border}`}} onClick={e=>e.stopPropagation()}>
              <div style={{height:10}}/>
              {[['Restaurant Name','name'],['Contact Name','contact'],['Phone','phone'],['Email','email'],['Service','service']].map(([label,key])=>(
                <input key={key} value={c[key]||''} onChange={e=>upd(c.id,{[key]:e.target.value})} placeholder={label} style={{width:'100%',padding:'8px 10px',borderRadius:8,border:`1px solid ${C.border}`,background:'#0d0d0d',color:C.white,fontSize:13,marginBottom:8,outline:'none'}}/>
              ))}
              <div style={{display:'flex',gap:8,marginBottom:8}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:10,color:C.inkM,fontWeight:600,marginBottom:3,textTransform:'uppercase'}}>Monthly Retainer $</div>
                  <input type="number" value={c.retainer||''} onChange={e=>upd(c.id,{retainer:Number(e.target.value)})} placeholder="1500" style={{width:'100%',padding:'8px 10px',borderRadius:8,border:`1px solid ${C.border}`,background:'#0d0d0d',color:C.gold,fontSize:14,fontWeight:700,outline:'none'}}/>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:10,color:C.inkM,fontWeight:600,marginBottom:3,textTransform:'uppercase'}}>Stage</div>
                  <select value={c.status} onChange={e=>upd(c.id,{status:e.target.value})} style={{width:'100%',padding:'8px 10px',borderRadius:8,border:`1px solid ${C.border}`,background:'#0d0d0d',color:C.white,fontSize:13,outline:'none',height:36}}>
                    {stages.map(s=><option key={s}>{s}</option>)}
                  </select>
                </div>
              </div>
              <textarea value={c.notes||''} onChange={e=>upd(c.id,{notes:e.target.value})} placeholder="Notes..." rows={2} style={{width:'100%',padding:'8px 10px',borderRadius:8,border:`1px solid ${C.border}`,background:'#0d0d0d',color:C.white,fontSize:12,resize:'none',outline:'none',marginBottom:10}}/>
              <div style={{display:'flex',gap:8}}>
                {c.phone&&<button onClick={()=>onCallMode({...c,type:'agency'},null,[])} style={{flex:1,padding:'10px',borderRadius:10,background:C.green,border:'none',color:'#000',fontSize:13,fontWeight:800,cursor:'pointer'}}>📞 Call Mode</button>}
                {c.phone&&<a href={`tel:${dialNum(c.phone)}`} style={{padding:'10px 14px',borderRadius:10,background:C.greenBg,border:`1px solid ${C.green}44`,color:C.green,fontSize:13,fontWeight:700,textDecoration:'none',display:'flex',alignItems:'center'}}>Dial</a>}
              </div>
            </div>
          )}
        </div>
      );})}
    </div>
  );
};

// ─── DEAL CALCULATOR TAB ─────────────────────────────────────────────────────

const DealCalcTab=()=>{
  const CALC_TABS=[
    {id:'subto',label:'🔑 Sub-To',color:C.teal},
    {id:'sf',label:'📝 Seller Fin',color:C.purple},
    {id:'wholesale',label:'🔄 Wholesale',color:C.orange},
    {id:'brrrr',label:'🏗️ BRRRR',color:C.blue},
    {id:'rental',label:'📈 Rental',color:C.green},
  ];
  const [mode,setMode]=useState('subto');
  const [sto,setSto]=useState({listPrice:589000,loanBal:380000,loanRate:3.5,existingPayment:1900,rent:3000,taxes:540,insurance:150,maintenance:150,pm:10,equityPayment:30000});
  const [sf,setSf]=useState({price:589000,down:50000,rate:5.0,term:30,amortType:'amort',rent:3000,taxes:540,insurance:150,maintenance:150,pm:10});
  const [ws,setWs]=useState({arv:589000,repairs:0,assignFee:20000});
  const [br,setBr]=useState({purchase:400000,rehab:30000,arv:500000,refiLtv:75,refiRate:7.0,refiTerm:30,rent:3000,taxes:500,insurance:150,maintenance:150,pm:10});
  const [rl,setRl]=useState({price:589000,down:20,rate:7.0,term:30,rent:3000,vacancy:5,taxes:540,insurance:150,maintenance:150,pm:10});
  const fmt=(n)=>`$${Math.abs(n).toLocaleString('en-US',{maximumFractionDigits:0})}`;
  const pmt=(pv,r,n)=>r===0?pv/n:pv*(r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
  const cfColor=(cf)=>cf>0?C.green:cf>-200?C.orange:C.red;
  const Inp=({val,set,label,pre='$'})=>(
    <div style={{marginBottom:10}}>
      <div style={{fontSize:10,color:C.inkM,marginBottom:3}}>{label}</div>
      <div style={{display:'flex',alignItems:'center',background:C.card2,borderRadius:8,border:`1px solid ${C.border}`}}>
        <span style={{padding:'0 8px',color:C.inkM,fontSize:12}}>{pre}</span>
        <input type="number" value={val} onChange={e=>set(+e.target.value)} style={{flex:1,background:'none',border:'none',color:C.ink,fontSize:14,fontWeight:600,padding:'10px 8px 10px 0',outline:'none',minWidth:0}}/>
      </div>
    </div>
  );
  const Row=({label,val,color=C.ink,sub=''})=>(
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',padding:'8px 0',borderBottom:`1px solid ${C.border}`}}>
      <div><div style={{fontSize:12,color:C.inkM}}>{label}</div>{sub&&<div style={{fontSize:10,color:C.inkL}}>{sub}</div>}</div>
      <div style={{fontSize:15,fontWeight:800,color}}>{val}</div>
    </div>
  );
  const Card=({children,color=C.gold,title})=>(
    <div style={{background:C.card,borderRadius:14,padding:16,marginBottom:14}}>
      {title&&<div style={{fontSize:13,fontWeight:700,color,marginBottom:12}}>{title}</div>}
      {children}
    </div>
  );
  const CFBlock=({cf,extra=[]})=>(
    <>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',padding:'12px 0 8px'}}>
        <div style={{fontSize:13,fontWeight:700,color:C.inkM}}>Monthly Cash Flow</div>
        <div style={{fontSize:28,fontWeight:900,color:cfColor(cf)}}>{cf>=0?'+':''}{fmt(cf)}</div>
      </div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        {[{label:'Annual CF',val:(cf>=0?'+':'-')+fmt(cf*12),color:cfColor(cf)},...extra].map(({label,val,color})=>(
          <div key={label} style={{flex:'1 0 45%',background:C.card2,borderRadius:10,padding:10,textAlign:'center'}}>
            <div style={{fontSize:10,color:C.inkM,marginBottom:2}}>{label}</div>
            <div style={{fontSize:15,fontWeight:800,color}}>{val}</div>
          </div>
        ))}
      </div>
    </>
  );
  const stoR=()=>{const pm=sto.rent*(sto.pm/100);const out=sto.existingPayment+sto.taxes+sto.insurance+sto.maintenance+pm;const cf=sto.rent-out;const equity=sto.listPrice-sto.loanBal;const coc=sto.equityPayment>0?(cf*12/sto.equityPayment*100):0;return{cf,equity,out,coc};};
  const sfR=()=>{const loan=sf.price-sf.down;const mr=sf.rate/100/12;const n=sf.term*12;const pymt=sf.amortType==='io'?loan*mr:pmt(loan,mr,n);const pm=sf.rent*(sf.pm/100);const out=pymt+sf.taxes+sf.insurance+sf.maintenance+pm;const cf=sf.rent-out;const coc=sf.down>0?(cf*12/sf.down*100):0;return{loan,pymt,out,cf,coc};};
  const wsR=()=>({mao65:ws.arv*0.65-ws.repairs,mao70:ws.arv*0.70-ws.repairs,mao75:ws.arv*0.75-ws.repairs,offer:ws.arv*0.70-ws.repairs-ws.assignFee});
  const brR=()=>{const allIn=br.purchase+br.rehab;const refiAmt=br.arv*(br.refiLtv/100);const cashOut=refiAmt-allIn;const cashLeft=Math.max(0,allIn-refiAmt);const mr=br.refiRate/100/12;const n=br.refiTerm*12;const mortPmt=pmt(refiAmt,mr,n);const pm=br.rent*(br.pm/100);const out=mortPmt+br.taxes+br.insurance+br.maintenance+pm;const cf=br.rent-out;const coc=cashLeft>0?(cf*12/cashLeft*100):Infinity;const equity=br.arv-refiAmt;return{allIn,refiAmt,cashOut,cashLeft,mortPmt,cf,coc,equity};};
  const rlR=()=>{const dn=rl.price*(rl.down/100);const loan=rl.price-dn;const mr=rl.rate/100/12;const n=rl.term*12;const mortPmt=pmt(loan,mr,n);const effRent=rl.rent*(1-rl.vacancy/100);const pm=effRent*(rl.pm/100);const out=mortPmt+rl.taxes+rl.insurance+rl.maintenance+pm;const cf=effRent-out;const noi=effRent-rl.taxes-rl.insurance-rl.maintenance-pm;const capRate=(noi*12)/rl.price*100;const grm=rl.price/(rl.rent*12);const coc=dn>0?(cf*12/dn*100):0;return{dn,loan,mortPmt,effRent,cf,noi,capRate,grm,coc,out};};
  const s=stoR(),f=sfR(),w=wsR(),b=brR(),r=rlR();
  return(
    <div style={{padding:'16px',paddingBottom:90}}>
      <div style={{fontSize:22,fontWeight:900,color:C.gold,marginBottom:2}}>Deal Calculator</div>
      <div style={{fontSize:12,color:C.inkM,marginBottom:14}}>Run any structure in seconds</div>
      <div style={{display:'flex',gap:4,marginBottom:18,overflowX:'auto',paddingBottom:4}}>
        {CALC_TABS.map(t=>(
          <button key={t.id} onClick={()=>setMode(t.id)} style={{flexShrink:0,padding:'7px 10px',borderRadius:10,border:`2px solid ${mode===t.id?t.color:C.border}`,background:mode===t.id?t.color+'22':'#111',color:mode===t.id?t.color:C.inkM,fontSize:10,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap'}}>{t.label}</button>
        ))}
      </div>
      {mode==='subto'&&<div>
        <Card color={C.teal} title="Property & Mortgage">
          <Inp val={sto.listPrice} set={v=>setSto(p=>({...p,listPrice:v}))} label="List / ARV"/>
          <Inp val={sto.loanBal} set={v=>setSto(p=>({...p,loanBal:v}))} label="Existing Loan Balance"/>
          <Inp val={sto.loanRate} set={v=>setSto(p=>({...p,loanRate:v}))} label="Existing Interest Rate" pre="%"/>
          <Inp val={sto.existingPayment} set={v=>setSto(p=>({...p,existingPayment:v}))} label="Existing PITI Payment"/>
          <Inp val={sto.equityPayment} set={v=>setSto(p=>({...p,equityPayment:v}))} label="Cash to Seller (Equity)"/>
        </Card>
        <Card color={C.teal} title="Income & Expenses">
          <Inp val={sto.rent} set={v=>setSto(p=>({...p,rent:v}))} label="Monthly Rent"/>
          <Inp val={sto.taxes} set={v=>setSto(p=>({...p,taxes:v}))} label="Property Tax /mo"/>
          <Inp val={sto.insurance} set={v=>setSto(p=>({...p,insurance:v}))} label="Insurance /mo"/>
          <Inp val={sto.maintenance} set={v=>setSto(p=>({...p,maintenance:v}))} label="Maintenance /mo"/>
          <Inp val={sto.pm} set={v=>setSto(p=>({...p,pm:v}))} label="Property Mgmt %" pre="%"/>
        </Card>
        <Card color={C.gold} title="📊 Results">
          <Row label="Seller Equity" val={fmt(s.equity)}/>
          <Row label="Cash to Seller" val={fmt(sto.equityPayment)}/>
          <Row label="Existing PITI" val={fmt(sto.existingPayment)}/>
          <Row label="Total Monthly Out" val={fmt(s.out)}/>
          <Row label="Rent In" val={fmt(sto.rent)} color={C.green}/>
          <CFBlock cf={s.cf} extra={[{label:'CoC Return',val:`${s.coc.toFixed(1)}%`,color:s.coc>10?C.green:s.coc>0?C.orange:C.red}]}/>
          <div style={{marginTop:12,padding:10,background:s.cf>0?C.greenBg:C.redBg,borderRadius:10,borderLeft:`3px solid ${s.cf>0?C.green:C.red}`}}>
            <div style={{fontSize:11,fontWeight:700,color:s.cf>0?C.green:C.red}}>{s.cf>500?'✅ Strong — lock it up':s.cf>0?'⚡ Tight but works — negotiate equity down':s.cf>-300?'⚠️ Slightly negative — push rent or cut equity':'❌ Doesn\'t pencil — renegotiate or walk'}</div>
          </div>
        </Card>
      </div>}
      {mode==='sf'&&<div>
        <Card color={C.purple} title="Deal Terms">
          <Inp val={sf.price} set={v=>setSf(p=>({...p,price:v}))} label="Purchase Price"/>
          <Inp val={sf.down} set={v=>setSf(p=>({...p,down:v}))} label="Down Payment"/>
          <Inp val={sf.rate} set={v=>setSf(p=>({...p,rate:v}))} label="Interest Rate" pre="%"/>
          <Inp val={sf.term} set={v=>setSf(p=>({...p,term:v}))} label="Term (years)" pre="yr"/>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:10,color:C.inkM,marginBottom:3}}>Amortization Type</div>
            <div style={{display:'flex',gap:6}}>
              {['amort','io'].map(t=>(
                <button key={t} onClick={()=>setSf(p=>({...p,amortType:t}))} style={{flex:1,padding:'9px',borderRadius:8,border:`2px solid ${sf.amortType===t?C.purple:C.border}`,background:sf.amortType===t?C.purple+'22':'#111',color:sf.amortType===t?C.purple:C.inkM,fontSize:11,fontWeight:700,cursor:'pointer'}}>{t==='amort'?'Amortized':'Interest Only'}</button>
              ))}
            </div>
          </div>
        </Card>
        <Card color={C.purple} title="Income & Expenses">
          <Inp val={sf.rent} set={v=>setSf(p=>({...p,rent:v}))} label="Monthly Rent"/>
          <Inp val={sf.taxes} set={v=>setSf(p=>({...p,taxes:v}))} label="Property Tax /mo"/>
          <Inp val={sf.insurance} set={v=>setSf(p=>({...p,insurance:v}))} label="Insurance /mo"/>
          <Inp val={sf.maintenance} set={v=>setSf(p=>({...p,maintenance:v}))} label="Maintenance /mo"/>
          <Inp val={sf.pm} set={v=>setSf(p=>({...p,pm:v}))} label="Property Mgmt %" pre="%"/>
        </Card>
        <Card color={C.gold} title="📊 Results">
          <Row label="Loan Amount" val={fmt(f.loan)}/>
          <Row label={`Monthly Payment (${sf.amortType==='io'?'IO':'P&I'})`} val={fmt(f.pymt)}/>
          <Row label="Total Monthly Out" val={fmt(f.out)}/>
          <Row label="Rent In" val={fmt(sf.rent)} color={C.green}/>
          <CFBlock cf={f.cf} extra={[{label:'CoC Return',val:`${f.coc.toFixed(1)}%`,color:f.coc>8?C.green:f.coc>0?C.orange:C.red}]}/>
        </Card>
      </div>}
      {mode==='wholesale'&&<div>
        <Card color={C.orange} title="Deal Numbers">
          <Inp val={ws.arv} set={v=>setWs(p=>({...p,arv:v}))} label="After Repair Value (ARV)"/>
          <Inp val={ws.repairs} set={v=>setWs(p=>({...p,repairs:v}))} label="Estimated Repairs"/>
          <Inp val={ws.assignFee} set={v=>setWs(p=>({...p,assignFee:v}))} label="Your Assignment Fee"/>
        </Card>
        <Card color={C.gold} title="📊 MAO Breakdown">
          <div style={{display:'flex',gap:8,marginBottom:14}}>
            {[{pct:65,v:w.mao65,lbl:'Conservative'},{pct:70,v:w.mao70,lbl:'⭐ Standard'},{pct:75,v:w.mao75,lbl:'Aggressive'}].map(({pct,v,lbl})=>(
              <div key={pct} style={{flex:1,background:C.card2,borderRadius:10,padding:10,textAlign:'center',border:`1px solid ${pct===70?C.orange:C.border}`}}>
                <div style={{fontSize:9,color:pct===70?C.orange:C.inkM,marginBottom:2}}>{lbl}</div>
                <div style={{fontSize:10,color:C.inkL,marginBottom:3}}>{pct}% ARV</div>
                <div style={{fontSize:14,fontWeight:800,color:pct===70?C.orange:C.ink}}>{fmt(v)}</div>
              </div>
            ))}
          </div>
          <Row label="ARV" val={fmt(ws.arv)}/>
          <Row label="Repairs" val={fmt(ws.repairs)}/>
          <Row label="Assignment Fee" val={fmt(ws.assignFee)} color={C.green}/>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',padding:'12px 0 4px'}}>
            <div style={{fontSize:13,fontWeight:700,color:C.inkM}}>Your Max Offer (70%)</div>
            <div style={{fontSize:26,fontWeight:900,color:C.orange}}>{fmt(w.offer)}</div>
          </div>
          <div style={{marginTop:10,padding:10,background:C.orangeBg,borderRadius:10,borderLeft:`3px solid ${C.orange}`}}>
            <div style={{fontSize:11,fontWeight:700,color:C.orange}}>Buy at {fmt(w.offer)} → assign at {fmt(w.mao70)} → pocket {fmt(ws.assignFee)}</div>
          </div>
        </Card>
      </div>}
      {mode==='brrrr'&&<div>
        <Card color={C.blue} title="Acquisition">
          <Inp val={br.purchase} set={v=>setBr(p=>({...p,purchase:v}))} label="Purchase Price"/>
          <Inp val={br.rehab} set={v=>setBr(p=>({...p,rehab:v}))} label="Rehab Budget"/>
          <Inp val={br.arv} set={v=>setBr(p=>({...p,arv:v}))} label="After Repair Value (ARV)"/>
        </Card>
        <Card color={C.blue} title="Refinance Terms">
          <Inp val={br.refiLtv} set={v=>setBr(p=>({...p,refiLtv:v}))} label="Refi LTV %" pre="%"/>
          <Inp val={br.refiRate} set={v=>setBr(p=>({...p,refiRate:v}))} label="Refi Rate %" pre="%"/>
          <Inp val={br.refiTerm} set={v=>setBr(p=>({...p,refiTerm:v}))} label="Refi Term (years)" pre="yr"/>
        </Card>
        <Card color={C.blue} title="Rental Income & Expenses">
          <Inp val={br.rent} set={v=>setBr(p=>({...p,rent:v}))} label="Monthly Rent"/>
          <Inp val={br.taxes} set={v=>setBr(p=>({...p,taxes:v}))} label="Property Tax /mo"/>
          <Inp val={br.insurance} set={v=>setBr(p=>({...p,insurance:v}))} label="Insurance /mo"/>
          <Inp val={br.maintenance} set={v=>setBr(p=>({...p,maintenance:v}))} label="Maintenance /mo"/>
          <Inp val={br.pm} set={v=>setBr(p=>({...p,pm:v}))} label="Property Mgmt %" pre="%"/>
        </Card>
        <Card color={C.gold} title="📊 Results">
          <Row label="All-In Cost" val={fmt(b.allIn)}/>
          <Row label={`Refi Loan (${br.refiLtv}% LTV)`} val={fmt(b.refiAmt)}/>
          <Row label="Cash Pulled Out" val={(b.cashOut>=0?'+':'-')+fmt(b.cashOut)} color={b.cashOut>=0?C.green:C.red}/>
          <Row label="Cash Left in Deal" val={fmt(b.cashLeft)} color={b.cashLeft<5000?C.green:b.cashLeft<30000?C.orange:C.red} sub="Lower = better BRRRR"/>
          <Row label="New Mortgage (P&I)" val={fmt(b.mortPmt)}/>
          <CFBlock cf={b.cf} extra={[{label:'CoC (on cash left)',val:b.coc===Infinity?'∞%':`${b.coc.toFixed(1)}%`,color:b.coc===Infinity||b.coc>10?C.green:b.coc>0?C.orange:C.red},{label:'Post-Refi Equity',val:fmt(b.equity),color:C.blue}]}/>
        </Card>
      </div>}
      {mode==='rental'&&<div>
        <Card color={C.green} title="Purchase & Financing">
          <Inp val={rl.price} set={v=>setRl(p=>({...p,price:v}))} label="Purchase Price"/>
          <Inp val={rl.down} set={v=>setRl(p=>({...p,down:v}))} label="Down Payment %" pre="%"/>
          <Inp val={rl.rate} set={v=>setRl(p=>({...p,rate:v}))} label="Interest Rate %" pre="%"/>
          <Inp val={rl.term} set={v=>setRl(p=>({...p,term:v}))} label="Loan Term (years)" pre="yr"/>
        </Card>
        <Card color={C.green} title="Income & Expenses">
          <Inp val={rl.rent} set={v=>setRl(p=>({...p,rent:v}))} label="Gross Monthly Rent"/>
          <Inp val={rl.vacancy} set={v=>setRl(p=>({...p,vacancy:v}))} label="Vacancy Rate %" pre="%"/>
          <Inp val={rl.taxes} set={v=>setRl(p=>({...p,taxes:v}))} label="Property Tax /mo"/>
          <Inp val={rl.insurance} set={v=>setRl(p=>({...p,insurance:v}))} label="Insurance /mo"/>
          <Inp val={rl.maintenance} set={v=>setRl(p=>({...p,maintenance:v}))} label="Maintenance /mo"/>
          <Inp val={rl.pm} set={v=>setRl(p=>({...p,pm:v}))} label="Property Mgmt %" pre="%"/>
        </Card>
        <Card color={C.gold} title="📊 Results">
          <Row label="Down Payment" val={fmt(r.dn)}/>
          <Row label="Loan Amount" val={fmt(r.loan)}/>
          <Row label="Mortgage (P&I)" val={fmt(r.mortPmt)}/>
          <Row label="Effective Rent" val={fmt(r.effRent)} sub="after vacancy"/>
          <Row label="Total Monthly Out" val={fmt(r.out)}/>
          <CFBlock cf={r.cf} extra={[{label:'CoC Return',val:`${r.coc.toFixed(1)}%`,color:r.coc>8?C.green:r.coc>0?C.orange:C.red},{label:'Cap Rate',val:`${r.capRate.toFixed(1)}%`,color:r.capRate>7?C.green:r.capRate>5?C.orange:C.red},{label:'GRM',val:r.grm.toFixed(1),color:r.grm<10?C.green:r.grm<14?C.orange:C.red}]}/>
        </Card>
      </div>}
    </div>
  );
};

// ─── APP ─────────────────────────────────────────────────────────────────────

const TABS=[{id:'dashboard',label:'Home',icon:'📊'},{id:'leads',label:'Leads',icon:'📋'},{id:'agency',label:'Agency',icon:'🍽️'},{id:'buyers',label:'Buyers',icon:'👥'},{id:'deals',label:'Deals',icon:'🧮'}];

const load=(key,fallback)=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):fallback;}catch{return fallback;}};

const App=()=>{
  const [tab,setTab]=useState('dashboard');
  const [surplus,setSurplus]=useState(()=>load('rf_surplus',INIT_SURPLUS));
  const [foreclosure,setForeclosure]=useState(()=>load('rf_fc',INIT_FORECLOSURE));
  const [seller,setSeller]=useState(()=>load('rf_seller',INIT_SELLER));
  const [agency,setAgency]=useState(()=>load('rf_agency',INIT_AGENCY));
  const [callState,setCallState]=useState(null);

  useEffect(()=>{localStorage.setItem('rf_surplus',JSON.stringify(surplus));},[surplus]);
  useEffect(()=>{localStorage.setItem('rf_fc',JSON.stringify(foreclosure));},[foreclosure]);
  useEffect(()=>{localStorage.setItem('rf_seller',JSON.stringify(seller));},[seller]);
  useEffect(()=>{localStorage.setItem('rf_agency',JSON.stringify(agency));},[agency]);

  const openCallMode=(lead,type,callable=[])=>setCallState({lead,type,callable:callable.length?callable:[lead]});

  const updateLead=(updated)=>{
    const update=(prev)=>prev.map(l=>l.id===updated.id?updated:l);
    if(callState.type==='surplus')setSurplus(update);
    else if(callState.type==='foreclosure')setForeclosure(update);
    else if(callState.type==='seller')setSeller(update);
    else if(callState.type==='agency')setAgency(update);
    setCallState(p=>({...p,lead:updated}));
  };

  const callIdx=callState?callState.callable.findIndex(l=>l.id===callState.lead.id):0;
  const goNext=()=>{if(callState&&callIdx<callState.callable.length-1)setCallState(p=>({...p,lead:p.callable[callIdx+1]}));};
  const goPrev=()=>{if(callState&&callIdx>0)setCallState(p=>({...p,lead:p.callable[callIdx-1]}));};

  return(
    <div style={{maxWidth:480,margin:'0 auto',minHeight:'100vh',background:C.bg,position:'relative'}}>
      <div style={{height:48}}/>
      {callState&&<CallMode lead={callState.lead} allCallable={callState.callable} leadIndex={callIdx} onClose={()=>setCallState(null)} onUpdate={updateLead} onNext={goNext} onPrev={goPrev}/>}
      {!callState&&<>
        {tab==='dashboard'&&<Dashboard surplus={surplus} foreclosure={foreclosure} seller={seller} agency={agency} onCallMode={openCallMode}/>}
        {tab==='leads'&&<LeadsTab surplus={surplus} setSurplus={setSurplus} foreclosure={foreclosure} setForeclosure={setForeclosure} seller={seller} setSeller={setSeller} onCallMode={openCallMode}/>}
        {tab==='agency'&&<AgencyTab clients={agency} setClients={setAgency} onCallMode={openCallMode}/>}
        {tab==='buyers'&&<BuyersTab/>}
        {tab==='deals'&&<DealCalcTab/>}
      </>}
      {!callState&&(
        <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:480,background:'rgba(10,10,10,0.97)',backdropFilter:'blur(20px)',borderTop:`1px solid ${C.border}`,display:'flex',padding:'10px 0 30px',zIndex:100}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:'none',border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:'4px 0'}}>
              <span style={{fontSize:20,filter:tab===t.id?'none':'grayscale(1) opacity(0.4)'}}>{t.icon}</span>
              <span style={{fontSize:10,fontWeight:tab===t.id?800:500,color:tab===t.id?C.gold:C.inkL}}>{t.label}</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
